server.port=8081
spring.application.name=user-service
spring.datasourse.url=jdbc:h2:mem:testdb
spring.h2.console.path=/h2

# Retry - userService
resilience4j.retry.instances.userService.maxAttempts=5
resilience4j.retry.instances.userService.waitDuration=10s

# Circuit Breaker - userService
resilience4j.circuitbreaker.instances.userService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.userService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.userService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.userService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.userService.slidingWindowSize=10

logging.level.io.retrykit=DEBUG

# RetryKit
# retrykit.yaml doit être EXTERNE au JAR pour que le hot reload fonctionne.
# En dev    : poser retrykit.yaml à la racine du projet (next to pom.xml), lancer via ./mvnw spring-boot:run
# En prod   : poser retrykit.yaml à côté du JAR, passer le chemin absolu :
#               java -jar app.jar --retrykit.config.path=/etc/myapp/retrykit.yaml
retrykit.config.path=retrykit.yaml
retrykit.pipeline.dsl=TIMEOUT(3s) > RETRY(3) > CB(50%)
retrykit.logging.enabled=true
retrykit.logging.level=DEBUG